name: Publish npm packages

on:
  push:
    branches: [main]
    paths:
      - 'gateways/oai-gateway/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@huangcheng'

      - name: Publish @huangcheng/oai-gateway
        working-directory: gateways/oai-gateway
        run: npm publish --access public || echo "Already published or unchanged"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
