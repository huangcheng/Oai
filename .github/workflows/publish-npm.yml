name: Publish npm packages

on:
  push:
    branches: [main]
    paths:
      - 'gateways/qlippy-gateway/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@huangcheng'

      - name: Publish @huangcheng/qlippy-gateway
        working-directory: gateways/qlippy-gateway
        run: npm publish --access public || echo "Already published or unchanged"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
