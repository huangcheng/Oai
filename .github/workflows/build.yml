name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtnetworkauth'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest --output-on-failure || true

      - name: Package
        run: |
          cd build
          macdeployqt Qlippy.app
          cp -R ../assets Qlippy.app/Contents/MacOS/assets
          # Ad-hoc sign so Gatekeeper doesn't flag it as damaged
          codesign --force --deep --sign - Qlippy.app
          # Remove quarantine attribute
          xattr -cr Qlippy.app
          tar -czf Qlippy-darwin-arm64.tar.gz Qlippy.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qlippy-darwin-arm64
          path: build/Qlippy-darwin-arm64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtnetworkauth'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest -C Release --output-on-failure
        continue-on-error: true

      - name: Package
        shell: bash
        run: |
          cd build
          mkdir package
          find . -name "Qlippy.exe" -not -path "./package/*" -exec cp {} package/ \; 2>/dev/null || true
          windeployqt package/Qlippy.exe || true
          cp -R ../assets package/assets
          cd package && 7z a ../Qlippy-windows-x86_64.zip . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qlippy-windows-x86_64
          path: build/Qlippy-windows-x86_64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 libxcb-xinerama0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtnetworkauth'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest --output-on-failure || true

      - name: Package
        run: |
          cd build
          mkdir -p package
          cp Qlippy package/
          cp -R ../assets package/assets
          tar -czf Qlippy-linux-x86_64.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qlippy-linux-x86_64
          path: build/Qlippy-linux-x86_64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Qlippy-darwin-arm64/Qlippy-darwin-arm64.tar.gz
            artifacts/Qlippy-windows-x86_64/Qlippy-windows-x86_64.zip
            artifacts/Qlippy-linux-x86_64/Qlippy-linux-x86_64.tar.gz
