name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtnetworkauth'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest --output-on-failure || true

      - name: Package
        run: |
          cd build
          macdeployqt Oai.app
          mkdir -p Oai.app/Contents/Resources/packs
          cp packs/*.opk Oai.app/Contents/Resources/packs/ 2>/dev/null || true
          codesign --force --deep --sign - Oai.app
          xattr -cr Oai.app
          hdiutil create -volname "Oai" -srcfolder Oai.app -ov -format UDZO Oai-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oai-macos
          path: build/Oai-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtnetworkauth'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest -C Release --output-on-failure
        continue-on-error: true

      - name: Package
        shell: bash
        run: |
          cd build
          mkdir -p Oai-windows
          find . -name "Oai.exe" -not -path "./Oai-windows/*" | head -1 | xargs -I{} cp {} Oai-windows/
          cp -R ../assets Oai-windows/assets
          cd Oai-windows && windeployqt Oai.exe || true
          cd .. && zip -r Oai-windows.zip Oai-windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oai-windows
          path: build/Oai-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 libxcb-xinerama0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtnetworkauth'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest --output-on-failure || true

      - name: Package
        run: |
          cd build
          mkdir -p package
          cp Oai package/
          cp -R ../assets package/assets
          tar -czf Oai-linux-x86_64.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oai-linux-x86_64
          path: build/Oai-linux-x86_64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Oai-macos/Oai-macos.dmg
            artifacts/Oai-windows/Oai-windows.zip
            artifacts/Oai-linux-x86_64/Oai-linux-x86_64.tar.gz
