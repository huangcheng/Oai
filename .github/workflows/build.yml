name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtnetworkauth'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest --output-on-failure || true

      - name: Package
        run: |
          cd build
          macdeployqt Orai.app
          # Copy packs into Resources
          mkdir -p Orai.app/Contents/Resources/packs
          cp packs/*.opk Orai.app/Contents/Resources/packs/ 2>/dev/null || true
          # Ad-hoc sign so Gatekeeper doesn't flag it as damaged
          codesign --force --deep --sign - Orai.app
          # Remove quarantine attribute
          xattr -cr Orai.app
          # Create DMG
          hdiutil create -volname "Orai" -srcfolder Orai.app -ov -format UDZO Orai-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orai-macos
          path: build/Orai-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtnetworkauth'

      - name: Install Qt IFW
        run: |
          pip install aqtinstall
          aqt install-tool windows desktop tools_ifw

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest -C Release --output-on-failure
        continue-on-error: true

      - name: Prepare installer files
        shell: bash
        run: |
          cd build
          mkdir -p installer/packages/com.orai.desktop/data
          # Find the executable (could be in Release/ subdirectory with MSVC)
          find . -name "Orai.exe" -not -path "./installer/*" | head -1 | xargs -I{} cp {} installer/packages/com.orai.desktop/data/
          cp -R packs installer/packages/com.orai.desktop/data/ 2>/dev/null || true
          windeployqt installer/packages/com.orai.desktop/data/Orai.exe || true

      - name: Build installer
        run: |
          $IFW_PATH = (Get-ChildItem -Path "C:\Users\*\AppData\Local\aqt\tools_ifw" -Directory | Select-Object -First 1).FullName
          & "$IFW_PATH\bin\binarycreator.exe" -c installer/config.xml -p installer/packages build/Orai-installer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orai-windows-installer
          path: build/Orai-installer.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 libxcb-xinerama0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtnetworkauth'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest --output-on-failure || true

      - name: Package
        run: |
          cd build
          mkdir -p package
          cp Orai package/
          cp -R ../assets package/assets
          tar -czf Orai-linux-x86_64.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orai-linux-x86_64
          path: build/Orai-linux-x86_64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Orai-macos/Orai-macos.dmg
            artifacts/Orai-windows-installer/Orai-installer.exe
            artifacts/Orai-linux-x86_64/Orai-linux-x86_64.tar.gz
